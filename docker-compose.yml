name: poll-app

services:
  postgres-poll-app:
    image: postgres:17.5-alpine3.21
    container_name: postgres-poll-app
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
  
  redis-poll-app: 
    image: redis:7.4.3-alpine
    container_name: redis-poll-app
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

  redisinsight-poll-app:
    image: redis/redisinsight:2.68
    container_name: redisinsight-poll-app
    depends_on:
      - redis-poll-app
    ports:
      - "5540:5540"
    restart: always

  express-api-poll-app:
    image: node:24-alpine3.20
    container_name: express-api-poll-app
    working_dir: /app
    restart: always
    ports:
      - "3001:3001"
      - "5555:5555"
    env_file:
      - .env
    volumes:
      - ./app:/app
    command: sh -c "
      npm install &&
      npm run dev
      "
    







